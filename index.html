<!doctypehtml><html lang=en><meta charset=UTF-8><meta content="width=device-width,initial-scale=1"name=viewport><title>ポモドーロタイマー</title><link href=img/favicon.png rel=icon sizes=32x32 type=image/png><link href=https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css rel=stylesheet><div class="container mt-5"><div class=row><div class=col-md-8><div class=card><div class="card-body text-center"><h1 class=display-4 id=timer>25:00</h1><p class=h5>ポモドーロ数：<span id=cycles>0</span><p class=h5 id=status>作業中</p><button class="btn btn-lg btn-primary"id=start-btn style=display:inline-block>スタート</button> <button class="btn btn-lg btn-secondary"id=pause-btn style=display:none>一時停止</button> <button class="btn btn-lg btn-secondary"id=restart-btn style=display:none>再開</button> <button class="btn btn-lg btn-secondary"id=skip-btn style=display:none>スキップ</button> <button class="btn btn-lg btn-danger"id=reset-btn style=display:none>リセット</button></div></div><p class="mt-3 mb-0 text-danger">※BGMの音量を0にするとブラウザの仕様でタイマーが止まってしまいます。<br>音量を完全に0にせずに使用してください。<div class="col-md-4 mt-2"><p class=h5 id=status>作業中BGM</p><audio controls id=audioPlayer src=music/Novoice.mp3 loop></audio><p class=h5 id=status>タイマー音</p><audio controls id=audioPlayer2 src=music/目覚まし時計のアラーム.mp3></audio><p class=h5 id=status>休憩中BGM</p><audio controls id=audioPlayer3 src="music/Drifting Clouds.mp3"loop></audio></div></div><div class=col-md-4><div class="card bg-secondary-subtle"><div class=card-body><h5 class=card-title>設定</h5><p class=text-info>今後バージョンアップにて使用可能になる予定です。<form id=settings-form><div class=mb-3><label class=form-label for=work-duration>作業時間 (分)</label> <input class=form-control disabled id=work-duration type=number min=1 value=25></div><div class=mb-3><label class=form-label for=break-duration>休憩時間 (分)</label> <input class=form-control disabled id=break-duration type=number min=1 value=5></div><div class=mb-3><label class=form-label for=long-break-duration>長時間休憩時間 (分)</label> <input class=form-control disabled id=long-break-duration type=number min=1 value=15></div><div class=mb-3><label class=form-label for=long-break-frequency>長時間休憩の頻度 (ポモドーロ数)</label> <input class=form-control disabled id=long-break-frequency type=number min=1 value=4></div><div class=form-check><input class=form-check-input disabled id=auto-start-work type=checkbox checked> <label class=form-check-label for=auto-start-work>次の作業を自動スタート</label></div><div class=form-check><input class=form-check-input disabled id=auto-start-break type=checkbox checked> <label class=form-check-label for=auto-start-break>次の休憩を自動スタート</label></div><div class=form-check><input class=form-check-input disabled id=mute-notifications type=checkbox> <label class=form-check-label for=mute-notifications>通知をミュート</label></div><button class="btn btn-success mt-3"disabled type=submit>設定を保存</button></form></div></div></div></div></div><script src=https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js></script><script src=PomodoroTimerController.js type=module></script>
