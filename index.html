<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ポモドーロタイマー | 無料で使える集中力アップツール</title>
    <meta name="description" content="ポモドーロタイマーは、作業効率を向上させるための無料オンラインツールです。シンプルで使いやすく、時間管理をサポートします。">
    <link rel="icon" type="image/png" sizes="32x32" href="img/favicon.png">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-1RJ8SFSVDC"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());

        gtag('config', 'G-1RJ8SFSVDC');
    </script>
</head>

<body>
    <div class="container mt-5">
        <div class="row">
            <h1 class="h2 text-sm-center mb-3">ポモドーロタイマー - 無料オンラインツール</h1>
        </div>
        <div class="row">
            <!-- Timer Section -->
            <div class="col-md-8">
                <div class="card">
                    <div class="card-body text-center">
                        <p id="timer" class="display-4">25:00</p>
                        <p class="h5">ポモドーロ数：<span id="cycles">0</span></p>
                        <p id="status" class="h5">作業中</p>
                        <button id="start-btn" class="btn btn-primary btn-lg"
                            style="display:inline-block;">スタート</button>
                        <button id="pause-btn" class="btn btn-secondary btn-lg" style="display:none;">一時停止</button>
                        <button id="restart-btn" class="btn btn-secondary btn-lg" style="display:none;">再開</button>
                        <button id="skip-btn" class="btn btn-secondary btn-lg" style="display:none;">スキップ</button>
                        <button id="reset-btn" class="btn btn-danger btn-lg" style="display:none;">リセット</button>
                    </div>
                </div>
                <p class="text-danger mt-3 mb-2 small">※BGMの音量を0にするとブラウザの仕様でタイマーが止まってしまいます。音量を完全に0にせずに使用してください。</p>

                <!-- 現在の音源 (アクティブなものだけ表示) -->
                <div class="card mb-3">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h5 class="card-title mb-0">現在の音源: <span id="active-source-label" class="text-primary">作業中BGM</span></h5>
                            <span id="active-phase-badge" class="badge bg-secondary">停止中</span>
                        </div>

                        <div id="workBgmWrapper" class="active-source-content">
                            <audio id="audioPlayer" src="music/Novoice.mp3" loop controls class="w-100"></audio>
                        </div>
                        <div id="breakBgmWrapper" class="active-source-content" style="display:none;">
                            <audio id="audioPlayer3" src="music/Drifting Clouds.mp3" loop controls class="w-100"></audio>
                        </div>
                        <div id="voicyWrapper" class="active-source-content" style="display:none;">
                            <div id="voicyContainer"></div>
                            <p class="text-muted small mb-0 mt-2">Voicy プレイヤー内の再生ボタンを 1 回押してください。</p>
                        </div>
                        <div id="noneWrapper" class="active-source-content" style="display:none;">
                            <p class="text-muted mb-0 py-3 text-center">音源は使用されていません</p>
                        </div>
                    </div>
                </div>

                <!-- タイマー音 (常時表示) -->
                <div class="card mb-3">
                    <div class="card-body py-2">
                        <h6 class="card-subtitle text-muted mb-2">タイマー音 (フェーズ切替時)</h6>
                        <audio id="audioPlayer2" src="music/目覚まし時計のアラーム.mp3" controls class="w-100"></audio>
                    </div>
                </div>
            </div>

            <!-- Sidebar Section -->
            <div class="col-md-4">
                <div class="card bg-secondary-subtle">
                    <div class="card-body">
                        <h5 class="card-title">設定</h5>

                        <h6 class="mt-2">音源設定</h6>
                        <div class="mb-3">
                            <label for="work-source" class="form-label">作業中の音源</label>
                            <select id="work-source" class="form-select">
                                <option value="bgm">BGM (Novoice.mp3)</option>
                                <option value="voicy">Voicy</option>
                                <option value="none">音なし</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="break-source" class="form-label">休憩中の音源</label>
                            <select id="break-source" class="form-select">
                                <option value="bgm">BGM (Drifting Clouds.mp3)</option>
                                <option value="voicy">Voicy</option>
                                <option value="none">音なし</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="voicy-url" class="form-label">Voicy URL</label>
                            <input type="url" id="voicy-url" class="form-control"
                                value="https://voicy.jp/embed/channel/941"
                                placeholder="https://voicy.jp/embed/channel/941">
                            <div class="form-text">Voicy 埋め込み URL (既定は西野亮廣チャンネル)</div>
                        </div>
                        <hr>

                        <p class="text-info">以下は今後バージョンアップにて使用可能になる予定です。</p>
                        <form id="settings-form">
                            <div class="mb-3">
                                <label for="work-duration" class="form-label">作業時間 (分)</label>
                                <input type="number" id="work-duration" class="form-control" value="25" min="1"
                                    disabled>
                            </div>
                            <div class="mb-3">
                                <label for="break-duration" class="form-label">休憩時間 (分)</label>
                                <input type="number" id="break-duration" class="form-control" value="5" min="1"
                                    disabled>
                            </div>
                            <div class="mb-3">
                                <label for="long-break-duration" class="form-label">長時間休憩時間 (分)</label>
                                <input type="number" id="long-break-duration" class="form-control" value="5" min="1"
                                    disabled>
                            </div>
                            <div class="mb-3">
                                <label for="long-break-frequency" class="form-label">長時間休憩の頻度 (ポモドーロ数)</label>
                                <input type="number" id="long-break-frequency" class="form-control" value="4" min="1"
                                    disabled>
                            </div>
                            <div class="form-check">
                                <input type="checkbox" id="auto-start-work" class="form-check-input" checked disabled>
                                <label for="auto-start-work" class="form-check-label">次の作業を自動スタート</label>
                            </div>
                            <div class="form-check">
                                <input type="checkbox" id="auto-start-break" class="form-check-input" checked disabled>
                                <label for="auto-start-break" class="form-check-label">次の休憩を自動スタート</label>
                            </div>
                            <div class="form-check">
                                <input type="checkbox" id="mute-notifications" class="form-check-input" disabled>
                                <label for="mute-notifications" class="form-check-label">通知をミュート</label>
                            </div>
                            <button type="submit" class="btn btn-success mt-3" disabled>設定を保存</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>


    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- JavaScript Logic -->
    <script type="module" src="PomodoroTimerController.js"></script>
    <!-- <script type="module" src="MusicManager.js"></script> -->
    </script>
</body>

</html>
